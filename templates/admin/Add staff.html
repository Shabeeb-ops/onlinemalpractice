{% extends 'admin/home.html' %}
{% block body %}

<!-- Bootstrap 5 CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
  <div class="card shadow p-4 w-100" style="max-width: 600px;">

    <h2 class="text-center mb-4">Add Staff</h2>

    <form action="#" method="post">
      {% csrf_token %}

      <div class="mb-3">
        <label for="name" class="form-label">Name</label>
        <input type="text" id="name" name="name" class="form-control" required>
      </div>

      <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input type="email" id="email" name="email" class="form-control" required>
      </div>

      <div class="mb-3">
        <label for="phone" class="form-label">Phone</label>
        <input type="tel" pattern="[6789][0-9]{9}" id="phone" name="phone" class="form-control" required>
        <div class="form-text">Enter a valid 10-digit phone number starting with 6,7,8 or 9.</div>
      </div>

      <div class="mb-3">
        <label for="qualification" class="form-label">Qualification</label>
        <input type="text" id="qualification" name="qualification" class="form-control" required>
      </div>

      <div class="mb-3">
        <label for="place" class="form-label">Place</label>
        <input type="text" id="place" name="place" class="form-control" required>
      </div>

      <div class="mb-3">
        <label for="user" class="form-label">Username</label>
        <input type="text" id="user" name="user" class="form-control" required>
      </div>

      <div class="mb-4">
        <label for="password" class="form-label">Password</label>
        <input type="password" id="password" name="password" class="form-control" required>
      </div>

      <div class="d-grid">
        <button type="submit" class="btn btn-primary btn-lg">Add</button>
      </div>

    </form>
  </div>
</div>

<!-- Bootstrap 5 JS Bundle (Optional for interactive components) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

{% endblock %}
