{% extends 'admin/home.html' %}
{% block body %}

<!-- Bootstrap CSS (only if not already in base template) -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
  <div class="card shadow p-4" style="width: 100%; max-width: 500px;">
    <h4 class="text-center mb-4"><i class="fas fa-book me-2"></i>Add New Subject</h4>

    <form action="#" method="post">
      {% csrf_token %}

      <div class="mb-3">
        <label for="subject" class="form-label">
          <i class="fas fa-book-open me-2"></i>Subject
        </label>
        <input type="text" id="subject" name="subject" class="form-control" placeholder="Enter subject" required>
      </div>

      <div class="d-grid">
        <button type="submit" class="btn btn-success">
          <i class="fas fa-plus-circle me-2"></i>Add Subject
        </button>
      </div>
    </form>
  </div>
</div>

{% endblock %}
