{% extends 'admin/home.html' %}
{% block body %}

<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Add Staff</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 30px;
      background-color: #f2f2f2;
    }

    h2 {
      text-align: center;
    }

    table {
      margin: 0 auto;
      border-collapse: collapse;
      width: 50%;
      background-color: #fff;
      padding: 20px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    td {
      padding: 10px;
    }

    td:first-child {
      text-align: right;
      font-weight: bold;
    }

    input[type="text"],
    input[type="email"],
    input[type="tel"],
    input[type="password"] {
      width: 100%;
      padding: 8px;
      box-sizing: border-box;
    }

    .button-row {
      text-align: center;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }

  </style>
</head>
<body>

  <h2>Add Staff</h2>
  <form action="/myapp/admin_edit_staff_post/" method="post">
      {% csrf_token %}
    <table>
      <tr>
        <td><label for="name">Name:</label></td>
        <td><input type="text" id="name" name="name" value="{{ data.name }}" required></td>
      </tr>
      <tr>
        <td><label for="email">Email:</label></td>
        <td><input type="email" id="email" name="email" value="{{ data.email }}" required></td>
      </tr>
      <tr>
        <td><label for="phone">Phone:</label></td>
        <td><input type="tel" id="phone" name="phone" pattern="[6789][0-9]{9}" value="{{ data.contact }}" required></td>
      </tr>
      <tr>
        <td><label for="qualification">Qualification:</label></td>
        <td><input type="text" id="qualification" name="qualification" value="{{ data.qualification }}" required></td>
      </tr>
      <tr>
        <td><label for="place">Place:</label></td>
        <td><input type="text" id="place" name="place" value="{{ data.place }}" required></td>
      </tr>


      <tr>
        <td colspan="2" class="button-row">
          <button type="submit">Edit</button>
        </td>
      </tr>
    </table>
  </form>

</body>
</html>

{% endblock %}
