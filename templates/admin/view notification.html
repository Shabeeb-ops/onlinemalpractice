{% extends 'admin/home.html' %}
{% block body %}



<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Notifications</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }
        .add-new {
            margin-bottom: 15px;
            display: inline-block;
            padding: 10px 15px;
            background-color: #28a745;
            color: white;
            text-decoration: none;
            border-radius: 4px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid #ccc;
            padding: 12px;
            text-align: left;
        }
        th {
            background-color: #f4f4f4;
        }
        a.delete-link {
            color: red;
            text-decoration: none;
        }
        a.delete-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <a href="/myapp/admin_add_notification#about" class="add-new">Add New</a>

    <table>
        <thead>
            <tr>
                <th>SlNo</th>
                <th>Date</th>
                <th>Notification</th>
                <th></th>
            
            </tr>
        </thead>
        <tbody>
        {% for i in data %}
            <tr>
                <td>{{ forloop.counter }}</td>
                <td>{{ i.date }}</td>
                <td>{{ i.notification }}</td>

                <td><a href="/myapp/admin_delete_notification/{{ i.id }}" class="btn btn-danger">Delete</a></td>
            </tr>

        {% endfor %}
        </tbody>
    </table>

</body>
</html>


{% endblock %}
