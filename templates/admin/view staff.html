{% extends 'admin/home.html' %}
{% block body %}

<!-- Font Awesome CDN (not included in base template) -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

<div class="container mt-5">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h3><i class="fas fa-user-tie me-2"></i>Staff Directory</h3>
    <!-- Button trigger modal -->
    <button type="button" class="btn btn-success" data-bs-toggle="modal" data-bs-target="#addStaffModal">
      <i class="fas fa-user-plus me-1"></i> Add New
    </button>
  </div>

  <!-- Search -->
  <div class="mb-4">
    <input type="text" id="searchInput" onkeyup="searchCards()" class="form-control form-control-lg" placeholder="Search staff by name...">
  </div>

  <!-- Staff Cards Grid -->
  <div class="row" id="staffCards">
    {% for i in data %}
    <div class="col-sm-6 col-md-4 col-lg-3 mb-4 staff-card">
      <div class="card h-100 shadow-sm border-primary">
        <div class="card-body d-flex flex-column align-items-center text-center">
          <!-- User Icon -->
          <div class="mb-3">
            <i class="fas fa-user-circle fa-5x text-primary"></i>
          </div>

          <h5 class="card-title">{{ i.name }}</h5>
          <p class="card-text text-muted mb-1"><i class="fas fa-phone-alt me-2"></i>{{ i.contact }}</p>
          <p class="card-text text-muted mb-1"><i class="fas fa-envelope me-2"></i>{{ i.email }}</p>
          <p class="card-text text-muted mb-1"><i class="fas fa-map-marker-alt me-2"></i>{{ i.place }}</p>
          <p class="card-text text-muted mb-3"><i class="fas fa-graduation-cap me-2"></i>{{ i.qualification }}</p>

          <!-- Action Buttons -->
          <div class="btn-group" role="group" aria-label="Staff actions">
            <!-- Edit uses LOGIN_id because view does: Staff_table.objects.get(LOGIN_id=id) -->
            <a href="/myapp/admin_edit_staff/{{ i.LOGIN_id }}#about"
               class="btn btn-outline-primary"
               data-bs-toggle="tooltip" data-bs-placement="top" title="Edit">
              <i class="fas fa-edit"></i>
            </a>
            <!-- Delete uses id (Staff_table pk) because view does: Staff_table.objects.get(id=id) -->
            <a href="/myapp/admin_delete_staff/{{ i.id }}#about"
               class="btn btn-outline-danger"
               data-bs-toggle="tooltip" data-bs-placement="top" title="Delete"
               onclick="return confirm('Are you sure you want to delete this staff?');">
              <i class="fas fa-trash-alt"></i>
            </a>
            <!-- Assign uses id (Staff_table pk) because view does: Assign_table.objects.filter(STAFF=id) -->
            <a href="/myapp/admin_view_assign_staff/{{ i.id }}#about"
               class="btn btn-outline-warning"
               data-bs-toggle="tooltip" data-bs-placement="top" title="Assign">
              <i class="fas fa-tasks"></i>
            </a>
          </div>
        </div>
      </div>
    </div>
    {% endfor %}
  </div>
</div>

<!-- Add Staff Modal -->
<div class="modal fade" id="addStaffModal" tabindex="-1" aria-labelledby="addStaffModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <form action="/myapp/admin_add_staff/" method="post" id="addStaffForm">
        {% csrf_token %}
        <div class="modal-header">
          <h5 class="modal-title" id="addStaffModalLabel"><i class="fas fa-user-plus me-2"></i>Add Staff</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">

          <div class="mb-3">
            <label for="nameModal" class="form-label">Name</label>
            <input type="text" id="nameModal" name="name" class="form-control" required>
          </div>

          <div class="mb-3">
            <label for="emailModal" class="form-label">Email</label>
            <input type="email" id="emailModal" name="email" class="form-control" required>
          </div>

          <div class="mb-3">
            <label for="phoneModal" class="form-label">Phone</label>
            <input type="tel" pattern="[6789][0-9]{9}" id="phoneModal" name="phone" class="form-control" required>
            <div class="form-text">Enter a valid 10-digit phone number starting with 6, 7, 8 or 9.</div>
          </div>

          <div class="mb-3">
            <label for="qualificationModal" class="form-label">Qualification</label>
            <input type="text" id="qualificationModal" name="qualification" class="form-control" required>
          </div>

          <div class="mb-3">
            <label for="placeModal" class="form-label">Place</label>
            <input type="text" id="placeModal" name="place" class="form-control" required>
          </div>

          <div class="mb-3">
            <label for="userModal" class="form-label">Username</label>
            <input type="text" id="userModal" name="user" class="form-control" required>
          </div>

          <div class="mb-3">
            <label for="passwordModal" class="form-label">Password</label>
            <input type="password" id="passwordModal" name="password" class="form-control" required>
          </div>

        </div>
        <div class="modal-footer">
          <button type="submit" class="btn btn-primary">Add Staff</button>
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- Tooltip & Search JS (Bootstrap already loaded in base home.html) -->
<script>
  document.addEventListener('DOMContentLoaded', function () {
    // Initialize Bootstrap tooltips
    var tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'));
    tooltipTriggerList.forEach(function (tooltipTriggerEl) {
      new bootstrap.Tooltip(tooltipTriggerEl);
    });
  });

  // Live search function
  function searchCards() {
    const input = document.getElementById("searchInput").value.toLowerCase();
    const cards = document.querySelectorAll(".staff-card");
    cards.forEach(card => {
      const name = card.querySelector(".card-title").textContent.toLowerCase();
      card.style.display = name.includes(input) ? "block" : "none";
    });
  }
</script>

{% endblock %}
