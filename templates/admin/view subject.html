{% extends 'admin/home.html' %}
{% block body %}

<!-- Include Bootstrap and Font Awesome (only if not already in your base) -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

<div class="container mt-5">

  <div class="d-flex justify-content-between align-items-center mb-4">
    <h3><i class="fas fa-book me-2"></i>Subjects List</h3>
    <a href="/myapp/admin_add_subject#about" class="btn btn-success">
      <i class="fas fa-plus-circle me-1"></i> Add New
    </a>
  </div>

  <div class="table-responsive">
    <table class="table table-bordered table-hover align-middle text-center">
      <thead class="table-dark">
        <tr>
          <th scope="col">Sl No</th>
          <th scope="col">Date</th>
          <th scope="col">Subject</th>
          <th scope="col">Actions</th>
        </tr>
      </thead>
      <tbody>
        {% for i in data %}
        <tr>
          <td>{{ forloop.counter }}</td>
          <td>{{ i.date }}</td>
          <td>{{ i.subject }}</td>
          <td>
            <a href="/myapp/admin_edit_subject/{{ i.id }}#about" class="btn btn-primary btn-sm me-1">
              <i class="fas fa-edit"></i> Edit
            </a>
            <a href="/myapp/admin_delete_subject/{{ i.id }}" class="btn btn-danger btn-sm"
               onclick="return confirm('Are you sure you want to delete this subject?');">
              <i class="fas fa-trash-alt"></i> Delete
            </a>
          </td>
        </tr>
        {% empty %}
        <tr>
          <td colspan="4" class="text-center text-muted">No subjects found.</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>

</div>

{% endblock %}
