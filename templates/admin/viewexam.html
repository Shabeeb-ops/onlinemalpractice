{% extends 'admin/home.html' %}
{% block body %}
<body>

    <center class="container my-5">
        <h2 class="mb-4 text-center">Exam Table</h2>

        <table class="table table-bordered table-striped">
            <thead class="table-dark">
                <tr>
                    <th>Exam</th>
                    <th>Date</th>
                    <th>Time</th>
                    <th>Subject</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
            {% for i in data %}
                <tr>
                    <td>{{ i.exam }}</td>
                    <td>{{ i.date }}</td>
                    <td>{{ i.time }}</td>
                    <td>{{ i.subject.subject }}</td>
                    <td><a href="/myapp/deleteexam/{{ i.id }}" class="btn btn-danger">Delete</a></td>
                </tr>
            {% endfor %}
            </tbody>
        </table>


        <td><a href="/myapp/add_exam#about" class="btn btn-success"> Add New</a></td></center>



    <!-- Bootstrap 5 JS (optional, for interactive components) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

{% endblock %}
