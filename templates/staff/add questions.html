{% extends 'staff/home.html' %}
{% block body %}

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add New Question</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
  <style>
    /* Custom styling for centering and card appearance */
    .question-form-card {
      max-width: 700px; /* Width for sufficient space for questions/options */
      margin-top: 5vh;
      box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.1);
      border-radius: 0.75rem;
    }
    .card-header {
      background-color: var(--bs-success); /* Use success color for add/create */
      color: white;
      border-top-left-radius: 0.75rem !important;
      border-top-right-radius: 0.75rem !important;
    }
  </style>
</head>
<body class="bg-light">

  <div class="container d-flex justify-content-center">
    <div class="card question-form-card">

      <div class="card-header text-center">
        <h2 class="h4 mb-0 py-2">
          <i class="fas fa-plus-circle me-2"></i> Add New Question
        </h2>
      </div>

      <div class="card-body p-4 p-md-5">

        <form action="/myapp/add_question_post/" method="post">

          <div class="mb-3">
            <label for="question" class="form-label fw-bold">Question</label>
            <textarea class="form-control" id="question" name="question" rows="3" required></textarea>
          </div>

          <div class="row">
            <div class="col-md-6 mb-3">
              <label for="option1" class="form-label">Option 1</label>
              <input type="text" class="form-control" id="option1" name="option1" required>
            </div>
            <div class="col-md-6 mb-3">
              <label for="option2" class="form-label">Option 2</label>
              <input type="text" class="form-control" id="option2" name="option2" required>
            </div>
          </div>

          <div class="row">
            <div class="col-md-6 mb-3">
              <label for="option3" class="form-label">Option 3</label>
              <input type="text" class="form-control" id="option3" name="option3" required>
            </div>
            <div class="col-md-6 mb-3">
              <label for="option4" class="form-label">Option 4</label>
              <input type="text" class="form-control" id="option4" name="option4" required>
            </div>
          </div>

          <div class="mb-4">
            <label for="answer" class="form-label fw-bold text-success">Correct Answer</label>
            <input type="text" class="form-control border-success" id="answer" name="answer" placeholder="Enter the exact answer text" required>
            <div id="answerHelp" class="form-text">Ensure the answer text exactly matches one of the options above.</div>
          </div>

          <div class="d-grid mt-4">
            <button type="submit" class="btn btn-success btn-lg">
              <i class="fas fa-save me-1"></i> ADD QUESTION
            </button>
          </div>

        </form>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

{% endblock %}
