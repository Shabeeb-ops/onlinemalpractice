{% extends 'staff/home.html' %}
{% block body %}

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Study Material</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex justify-content-center align-items-center vh-100">

  <div class="card shadow p-4 w-50">
    <h3 class="text-center mb-3">Add Study Material</h3>

    <form enctype="multipart/form-data" action="/myapp/upload_study_material/" method="post"> {% csrf_token %}
      <!-- Study Material Name -->



      <!-- File Upload -->
      <div class="mb-3">
        <label for="materialFile" class="form-label">Upload File</label>
        <input type="file" id="materialFile" name="materialFile" class="form-control" accept=".pdf,.doc,.docx,.ppt,.pptx,.txt" required>
      </div>

      <!-- Submit Button -->
      <div class="text-center">
        <button type="submit" class="btn btn-success px-4">UPLOAD</button>
      </div>
    </form>
  </div>

</body>
</html>

{% endblock %}
