{% extends 'staff/home.html' %}
{% block body %}

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Change Password</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
  <style>
    /* Custom styling for centering and card appearance */
    .password-card {
      max-width: 500px; /* Max width for readability */
      margin-top: 5vh;
      box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.1);
      border-radius: 0.75rem;
    }
    .card-header {
      background-color: var(--bs-primary);
      color: white;
      border-top-left-radius: 0.75rem !important;
      border-top-right-radius: 0.75rem !important;
    }
  </style>
</head>
<body class="bg-light">

  <div class="container d-flex justify-content-center">
    <div class="card password-card">

      <div class="card-header text-center">
        <h2 class="h4 mb-0 py-2">
          <i class="fas fa-lock me-2"></i> Change Password
        </h2>
      </div>

      <div class="card-body p-4 p-md-5">

        <p class="text-muted text-center mb-4">
          Please enter your current password and your new password twice.
        </p>

        <form action="#" method="post">

          <div class="mb-3">
            <label for="current_password" class="form-label fw-bold">Current Password</label>
            <input type="password" class="form-control" id="current_password" name="current_password" required aria-describedby="currentPasswordHelp">
            <div id="currentPasswordHelp" class="form-text">Your existing password.</div>
          </div>

          <div class="mb-3">
            <label for="new_password" class="form-label fw-bold">New Password</label>
            <input type="password" class="form-control" id="new_password" name="new_password" required>
          </div>

          <div class="mb-4">
            <label for="confirm_password" class="form-label fw-bold">Confirm New Password</label>
            <input type="password" class="form-control" id="confirm_password" name="confirm_password" required>
          </div>

          <div class="d-grid">
            <button type="submit" class="btn btn-primary btn-lg">
              <i class="fas fa-check-circle me-1"></i> Confirm Change
            </button>
          </div>

        </form>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

{% endblock %}
